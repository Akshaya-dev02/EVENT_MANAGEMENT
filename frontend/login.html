<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Event Management</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(-45deg, #8ec5fc, #e0c3fc, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: #333;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .form-container {
      max-width: 400px;
      background: rgb(245, 233, 233);
      padding: 40px;
      margin: 60px auto;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(193, 68, 68, 0.1);
    }

    /* Header Row: Login title (left) and Home link (right) */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header-row h2 {
      margin: 0;
      color: #1f2937;
      font-weight: bold;
    }

    .back-home-btn {
      text-decoration: none;
      color: #fff;
      background: #4f46e5;
      padding: 8px 15px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      transition: background 0.3s;
    }

    .back-home-btn:hover {
      background: #3730a3;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #6366f1;
    }

    p {
      margin-top: 10px;
      text-align: center;
    }

    #message {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <!-- Header Row -->
    <div class="header-row">
      <h2>Login</h2>
      <a href="index.html" class="back-home-btn">⬅ Go Back Home</a>
    </div>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p id="message"></p>
    <p>Don’t have an account? <a href="register.html">Register</a></p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:5000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        document.getElementById('message').textContent = data.message;

        if (res.ok) {
          // ✅ Save login state and user name
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("userName", data.name || "User");

          // ✅ Redirect to home page
          window.location.href = "index.html";
        }
      } catch {
        document.getElementById('message').textContent = "Server error. Try again.";
      }
      
    });
  </script>

</body>
</html>
